<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CC 2026/1 | Admin Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container {
            max-width: 800px;
            margin: 100px auto;
            padding: 40px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: white;
            font-family: inherit;
        }
        .output-container {
            margin-top: 40px;
            padding: 20px;
            background: #000;
            border-radius: 8px;
            position: relative;
        }
        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            color: #10b981;
        }
        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 5px 10px;
            font-size: 0.7rem;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .back-link:hover {
            color: var(--accent-color);
        }
    </style>
</head>
<body class="dark-theme">
    <div class="admin-container glass">
        <a href="index.html" class="back-link"><i class="ph ph-arrow-left"></i> Voltar ao site</a>
        <h1>Gerador de JSON de Material</h1>
        <p style="color: var(--text-secondary); margin-bottom: 30px;">Preencha os dados abaixo para gerar o código pronto para o <code>data.json</code>.</p>

        <form id="material-form">
            <div class="form-group">
                <label>Nome do Material</label>
                <input type="text" id="mat-nome" placeholder="Ex: Slides Aula 05 - Grafos" required>
            </div>
            <div class="form-group">
                <label>Link (URL)</label>
                <input type="url" id="mat-url" placeholder="https://cdn.discordapp.com/..." required>
            </div>
            <div class="grid-cards" style="grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 0;">
                <div class="form-group">
                    <label>Tipo de Arquivo</label>
                    <select id="mat-tipo">
                        <option value="PDF">PDF</option>
                        <option value="DOCX">DOCX</option>
                        <option value="PPTX">PPTX</option>
                        <option value="ZIP">ZIP</option>
                        <option value="LINK">Link Externo</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Categoria (Pasta)</label>
                    <input type="text" id="mat-cat" placeholder="Ex: Aulas, Listas, Provas" required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 20px;">
                <i class="ph ph-code"></i> Gerar Bloco JSON
            </button>
        </form>

        <div class="output-container" id="output-box" style="display: none;">
            <button class="btn btn-secondary copy-btn" id="copy-btn">Copiar</button>
            <pre id="json-output"></pre>
            <p style="font-size: 0.75rem; color: #777; margin-top: 15px;">
                <i class="ph ph-info"></i> Copie este bloco e cole dentro da lista <code>"materiais": [ ... ]</code> da matéria correspondente no <code>data.json</code>.
            </p>
        </div>
    </div>

    <script>
        const form = document.getElementById('material-form');
        const outputBox = document.getElementById('output-box');
        const outputPre = document.getElementById('json-output');
        const copyBtn = document.getElementById('copy-btn');

        form.onsubmit = (e) => {
            e.preventDefault();
            
            const material = {
                nome: document.getElementById('mat-nome').value,
                url: document.getElementById('mat-url').value,
                tipo: document.getElementById('mat-tipo').value,
                categoria: document.getElementById('mat-cat').value
            };

            const jsonString = JSON.stringify(material);
            outputPre.textContent = jsonString + ",";
            outputBox.style.display = 'block';
            
            // Scroll suave até o resultado
            outputBox.scrollIntoView({ behavior: 'smooth' });
        };

        copyBtn.onclick = () => {
            navigator.clipboard.writeText(outputPre.textContent);
            const originalText = copyBtn.innerText;
            copyBtn.innerText = "Copiado!";
            setTimeout(() => copyBtn.innerText = originalText, 2000);
        };
    </script>
</body>
</html>
